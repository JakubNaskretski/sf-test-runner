name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
      - run: npx -y @vscode/vsce@latest package --no-dependencies --allow-missing-repository
      - uses: actions/upload-artifact@v4
        with:
          name: sf-test-runner-vsix
          path: '*.vsix'
          retention-days: 30
